version: '3.8'

services:
  # Redis 服務
  redis:
    image: redis:7-alpine
    container_name: stock_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass stock_redis_pwd
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network
    environment:
      - TZ=Asia/Taipei

  # PostgreSQL 數據庫 (用於存儲歷史數據)
  postgres:
    image: postgres:15-alpine
    container_name: stock_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_db
      TZ: Asia/Taipei
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  # FastAPI 應用
  stock_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_api
    ports:
      - "8000:8000"
    environment:
      MAIAGENT_API_KEY: ${MAIAGENT_API_KEY:-}
      MAIAGENT_CHATBOT_ID: ${MAIAGENT_CHATBOT_ID:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: stock_redis_pwd
      REDIS_DB: 0
      POSTGRES_URL: postgresql://stock_user:stock_password@postgres:5432/stock_db
      TZ: Asia/Taipei
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stock_network
    restart: unless-stopped

  # Nginx 反向代理 (可選)
  nginx:
    image: nginx:alpine
    container_name: stock_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - stock_api
    networks:
      - stock_network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  stock_network:
    driver: bridge
