apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-config
  namespace: default
data:
  LOG_LEVEL: "INFO"
  TZ: "Asia/Taipei"
  REDIS_HOST: "stock-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: stock-secrets
  namespace: default
type: Opaque
stringData:
  MAIAGENT_API_KEY: "your_groq_api_key"
  MAIAGENT_CHATBOT_ID: "your_chatbot_id"
  SUPABASE_URL: "your_supabase_url"
  SUPABASE_KEY: "your_supabase_key"
  REDIS_PASSWORD: "stock_redis_pwd"
  POSTGRES_USER: "stock_user"
  POSTGRES_PASSWORD: "stock_password"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-redis
  labels:
    app: stock-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-redis
  template:
    metadata:
      labels:
        app: stock-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
          - redis-server
          - "--appendonly"
          - "yes"
          - "--requirepass"
          - "stock_redis_pwd"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: stock-redis
spec:
  selector:
    app: stock-redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
