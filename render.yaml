services:
  - type: web
    name: taiwan-stock-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MAIAGENT_API_KEY
        sync: false
      - key: MAIAGENT_CHATBOT_ID
        sync: false
      - key: MAIAGENT_WEBCHAT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: DB_PATH
        value: history.db
      # Email notifier removed
      - key: GEMINI_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: STOCK_ALERT_WEBHOOK
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: TZ
        value: Asia/Taipei
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: API_WORKERS
        value: "4"
      - key: PYTHON_VERSION
        value: "3.11"
